<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800;900&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 1200px;
    height: 300px;
    background-color: #faf9f6;
    font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 80px;
  }

  /* Canvas background pattern / subtle depth */
  .bg-decor {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background-image: 
      radial-gradient(circle at 15% 50%, rgba(230, 57, 70, 0.04) 0%, transparent 40%),
      radial-gradient(circle at 85% 50%, rgba(42, 157, 143, 0.05) 0%, transparent 45%);
  }

  /* Main Left Container */
  .left-container {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .wordmark {
    font-size: 72px;
    font-weight: 900;
    letter-spacing: -2px;
    background: linear-gradient(115deg, #e63946 0%, #f77f00 40%, #2a9d8f 75%, #00b4d8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 4px 12px rgba(230, 57, 70, 0.15));
    line-height: 1;
    white-space: nowrap;
  }

  /* Decorative Splatters SVG Layer */
  .splatter-layer {
    position: absolute;
    inset: 0;
    width: 1200px;
    height: 300px;
    pointer-events: none;
    z-index: 5;
  }

  /* Right Container: Iconic Motif */
  .right-container {
    position: relative;
    width: 340px;
    height: 240px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  /* Chat Bubble & Card Visual */
  .motif-wrapper {
    position: relative;
    width: 100%;
    height: 100%;
  }

</style>
</head>
<body>

  <div class="bg-decor"></div>

  <!-- Artistic Paint Splatters Overlay -->
  <svg class="splatter-layer" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Red Splatter Left-Top -->
    <g opacity="0.85">
      <path d="M 60 45 C 55 40 45 42 42 48 C 38 54 44 62 50 64 C 56 66 68 62 70 54 C 72 46 65 50 60 45 Z" fill="#e63946"/>
      <circle cx="35" cy="38" r="4.5" fill="#e63946"/>
      <circle cx="48" cy="26" r="2.5" fill="#e63946"/>
      <circle cx="75" cy="32" r="3" fill="#e63946"/>
      <circle cx="30" cy="55" r="2" fill="#e63946"/>
      <path d="M 85 48 C 92 45 98 52 93 58 C 88 64 80 58 85 48 Z" fill="#e63946"/>
    </g>

    <!-- Orange Splatter Middle-Bottom -->
    <g opacity="0.8">
      <path d="M 510 235 C 500 230 492 242 498 250 C 504 258 520 255 524 245 C 528 235 520 240 510 235 Z" fill="#f77f00"/>
      <circle cx="482" cy="245" r="3.5" fill="#f77f00"/>
      <circle cx="492" cy="262" r="2" fill="#f77f00"/>
      <circle cx="535" cy="252" r="4" fill="#f77f00"/>
      <circle cx="545" cy="238" r="2.5" fill="#f77f00"/>
    </g>

    <!-- Turquoise / Blue Splatter Right Around Motif -->
    <g opacity="0.85">
      <path d="M 740 65 C 732 58 720 68 726 78 C 732 88 748 82 752 72 C 756 62 748 72 740 65 Z" fill="#2a9d8f"/>
      <circle cx="715" cy="58" r="3" fill="#2a9d8f"/>
      <circle cx="725" cy="45" r="4.5" fill="#00b4d8"/>
      <circle cx="762" cy="52" r="2.5" fill="#2a9d8f"/>
      <circle cx="758" cy="85" r="3.5" fill="#00b4d8"/>
      <circle cx="770" cy="70" r="1.5" fill="#2a9d8f"/>
    </g>

    <!-- Small accent splatters near wordmark -->
    <g opacity="0.75">
      <circle cx="160" cy="215" r="3" fill="#e63946"/>
      <circle cx="172" cy="224" r="1.8" fill="#f77f00"/>
      <circle cx="440" cy="75" r="3.5" fill="#f77f00"/>
      <circle cx="452" cy="65" r="2" fill="#2a9d8f"/>
    </g>
  </svg>

  <!-- Left: Wordmark -->
  <div class="left-container">
    <div class="wordmark">skill-extractor</div>
  </div>

  <!-- Right: Iconic Motif (Chat Speech Bubble -> Extraction -> Glossy Skill Card) -->
  <div class="right-container">
    <svg width="340" height="240" viewBox="0 0 340 240" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Shadow filters -->
        <filter id="bubble-shadow" x="10" y="70" width="200" height="150" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
          <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1e293b" flood-opacity="0.08"/>
        </filter>
        
        <filter id="card-shadow" x="110" y="10" width="210" height="190" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
          <feDropShadow dx="4" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.16"/>
        </filter>

        <!-- Gradients -->
        <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="60%" stop-color="#f8fafc"/>
          <stop offset="100%" stop-color="#e2e8f0"/>
        </linearGradient>

        <linearGradient id="card-border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#e63946"/>
          <stop offset="50%" stop-color="#f77f00"/>
          <stop offset="100%" stop-color="#2a9d8f"/>
        </linearGradient>

        <linearGradient id="gloss-overlay" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
          <stop offset="35%" stop-color="#ffffff" stop-opacity="0.3"/>
          <stop offset="36%" stop-color="#ffffff" stop-opacity="0.0"/>
          <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0"/>
        </linearGradient>

        <linearGradient id="stream-grad" x1="0%" y1="100%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#f77f00" stop-opacity="0.2"/>
          <stop offset="50%" stop-color="#2a9d8f" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#00b4d8" stop-opacity="0.9"/>
        </linearGradient>

        <linearGradient id="bubble-bg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#f1f5f9"/>
        </linearGradient>
      </defs>

      <!-- Extraction Motion Stream / Rays -->
      <g>
        <!-- Arc motion paths representing extraction from bubble to card -->
        <path d="M 105 130 C 125 110, 145 90, 175 75" stroke="url(#stream-grad)" stroke-width="4" stroke-dasharray="6 4" stroke-linecap="round"/>
        <path d="M 125 145 C 145 125, 165 105, 195 90" stroke="url(#stream-grad)" stroke-width="3" stroke-dasharray="4 4" stroke-linecap="round" opacity="0.7"/>
        
        <!-- Energy / Sparkle Dots -->
        <circle cx="145" cy="112" r="3.5" fill="#f77f00"/>
        <circle cx="168" cy="94" r="4.5" fill="#2a9d8f"/>
        <circle cx="188" cy="78" r="3" fill="#00b4d8"/>
      </g>

      <!-- 1. Chat Speech Bubble (Bottom Left of Motif Area) -->
      <g filter="url(#bubble-shadow)">
        <!-- Bubble Body -->
        <path d="M 35 100 C 35 91.7157 41.7157 85 50 85 L 140 85 C 148.284 85 155 91.7157 155 100 L 155 150 C 155 158.284 148.284 165 140 165 L 75 165 L 48 185 L 53 165 L 50 165 C 41.7157 165 35 158.284 35 150 Z" 
              fill="url(#bubble-bg)" stroke="#cbd5e1" stroke-width="2"/>
        
        <!-- Chat Content Lines (Simulating Text/Prompt in Chat) -->
        <rect x="52" y="103" width="70" height="7" rx="3.5" fill="#94a3b8" opacity="0.6"/>
        <rect x="52" y="118" width="84" height="7" rx="3.5" fill="#cbd5e1" opacity="0.8"/>
        <rect x="52" y="133" width="50" height="7" rx="3.5" fill="#e2e8f0"/>
        
        <!-- Chat Icon / Avatar Dot -->
        <circle cx="138" cy="106.5" r="4" fill="#e63946" opacity="0.7"/>
      </g>

      <!-- 2. Glossy Skill Card (Pulled Out, Top Right of Motif Area) -->
      <g filter="url(#card-shadow)" transform="rotate(-6 200 95)">
        <!-- Card Outer Border (Gradient Accent) -->
        <rect x="138" y="28" width="144" height="134" rx="16" fill="url(#card-border-grad)"/>
        
        <!-- Card Inner White Body -->
        <rect x="140.5" y="30.5" width="139" height="129" rx="13.5" fill="url(#card-grad)"/>
        
        <!-- Card Header / Title Bar Accent -->
        <rect x="152" y="44" width="36" height="36" rx="10" fill="#2a9d8f" fill-opacity="0.12"/>
        
        <!-- Skill Icon: Lightning/Star Badge on Card -->
        <path d="M 170 51 L 163 63 L 170 63 L 168 73 L 177 60 L 170 60 Z" fill="#2a9d8f"/>
        
        <!-- Card Skill Text Lines -->
        <rect x="196" y="48" width="68" height="9" rx="4.5" fill="#1e293b"/>
        <rect x="196" y="63" width="48" height="7" rx="3.5" fill="#f77f00"/>

        <!-- Skill Badges / Tags inside Card -->
        <rect x="152" y="92" width="52" height="18" rx="9" fill="#e63946" fill-opacity="0.1"/>
        <rect x="158" y="97" width="40" height="8" rx="4" fill="#e63946"/>
        
        <rect x="210" y="92" width="54" height="18" rx="9" fill="#00b4d8" fill-opacity="0.1"/>
        <rect x="216" y="97" width="42" height="8" rx="4" fill="#00b4d8"/>

        <rect x="152" y="118" width="112" height="6" rx="3" fill="#e2e8f0"/>

        <!-- Gloss Sheen Overlay -->
        <rect x="140.5" y="30.5" width="139" height="129" rx="13.5" fill="url(#gloss-overlay)"/>
        
        <!-- Sparkle Star on Top Right of Card -->
        <path d="M 270 24 L 273 32 L 281 35 L 273 38 L 270 46 L 267 38 L 259 35 L 267 32 Z" fill="#f77f00"/>
        <path d="M 135 75 L 137 80 L 142 82 L 137 84 L 135 89 L 133 84 L 128 82 L 133 80 Z" fill="#00b4d8"/>
      </g>

    </svg>
  </div>

</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="100%" height="100%">
  <defs>
    <!-- Fonts import -->
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800&amp;family=Inter:wght@600&amp;display=swap');
      
      .brand-title {
        font-family: 'Outfit', sans-serif;
        font-weight: 800;
        font-size: 105px;
        fill: url(#textGrad);
        letter-spacing: -2px;
      }
      
      .brand-tagline {
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        font-size: 25px;
        fill: #2b2d42;
        letter-spacing: 0.5px;
      }
      
      .handprint {
        mix-blend-mode: multiply;
        filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.12));
      }
      
      .splatter {
        mix-blend-mode: multiply;
        opacity: 0.85;
      }
      
      .drip {
        mix-blend-mode: multiply;
        opacity: 0.9;
      }
    </style>

    <!-- Background wall gradient (subtle vignette off-white) -->
    <radialGradient id="wallGradient" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="70%" stop-color="#faf9f6" />
      <stop offset="100%" stop-color="#f2f0ea" />
    </radialGradient>

    <!-- Vibrant wordmark gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e63946" />
      <stop offset="30%" stop-color="#ff4d6d" />
      <stop offset="65%" stop-color="#7209b7" />
      <stop offset="100%" stop-color="#4ea8de" />
    </linearGradient>

    <!-- Standard handprint paths (right hand by default) -->
    <g id="handprint-template">
      <!-- Palm -->
      <path d="M -22,12 C -24,20 -15,28 -3,29 C 10,30 22,25 24,15 C 26,5 24,-10 20,-18 C 16,-26 5,-28 -5,-27 C -14,-26 -20,-18 -21,-5 C -22,2 -20,7 -22,12 Z" fill-rule="evenodd" />
      <!-- Thumb -->
      <path d="M -30,-2 C -38,-6 -46,-14 -42,-21 C -38,-28 -28,-20 -22,-12 C -18,-6 -22,4 -30,-2 Z" />
      <!-- Index -->
      <path d="M -22,-35 C -24,-45 -24,-62 -18,-65 C -12,-68 -11,-50 -13,-36 C -14,-28 -18,-28 -22,-35 Z" />
      <!-- Middle -->
      <path d="M -2,-38 C -3,-50 -2,-72 4,-74 C 10,-76 10,-55 8,-38 C 7,-28 2,-28 -2,-38 Z" />
      <!-- Ring -->
      <path d="M 18,-35 C 21,-45 23,-65 28,-67 C 33,-69 32,-50 29,-36 C 27,-28 22,-28 18,-35 Z" />
      <!-- Pinky -->
      <path d="M 33,-23 C 39,-31 44,-49 49,-49 C 54,-49 49,-34 42,-21 C 38,-15 34,-15 33,-23 Z" />
    </g>
  </defs>

  <!-- Full-canvas background with subtle border to define boundaries on light/dark themes -->
  <rect x="0" y="0" width="1200" height="340" rx="20" fill="url(#wallGradient)" stroke="#e2e1db" stroke-width="1.5" />

  <!-- Joyful handprints cluster (Left) -->
  <use href="#handprint-template" fill="#ff4d6d" transform="translate(155, 175) scale(0.8200) rotate(-20)" class="handprint" opacity="0.9" />
  <use href="#handprint-template" fill="#06d6a0" transform="translate(240, 205) scale(0.8800) scale(-1, 1) rotate(15)" class="handprint" opacity="0.9" />
  <use href="#handprint-template" fill="#ff9f1c" transform="translate(315, 145) scale(0.7600) rotate(-30)" class="handprint" opacity="0.9" />
  <use href="#handprint-template" fill="#e63946" transform="translate(410, 195) scale(0.8400) scale(-1, 1) rotate(25)" class="handprint" opacity="0.9" />
  <use href="#handprint-template" fill="#7209b7" transform="translate(185, 235) scale(0.7200) rotate(35)" class="handprint" opacity="0.9" />
  <use href="#handprint-template" fill="#4ea8de" transform="translate(355, 230) scale(0.8000) rotate(-15)" class="handprint" opacity="0.9" />

  <!-- Paint Drips -->
  <path d="M 182.0,250.0 C 182.0,268.0 180.2,280.0 185.0,280.0 C 189.8,280.0 188.0,268.0 188.0,250.0 Z" fill="#7209b7" class="drip" />
  <path d="M 352.5,246.0 C 352.5,261.0 351.0,271.0 355.0,271.0 C 359.0,271.0 357.5,261.0 357.5,246.0 Z" fill="#4ea8de" class="drip" />
  <path d="M 411.5,215.0 C 411.5,236.0 409.4,250.0 415.0,250.0 C 420.6,250.0 418.5,236.0 418.5,215.0 Z" fill="#e63946" class="drip" />

  <!-- Decorative Paint Splatters -->
  <circle cx="110" cy="130" r="4" fill="#ff4d6d" class="splatter" />
  <circle cx="120" cy="105" r="2" fill="#06d6a0" class="splatter" />
  <circle cx="140" cy="85" r="3" fill="#7209b7" class="splatter" />
  <circle cx="180" cy="75" r="5" fill="#ff9f1c" class="splatter" />
  <circle cx="210" cy="95" r="2.5" fill="#4ea8de" class="splatter" />
  <circle cx="280" cy="90" r="4" fill="#e63946" class="splatter" />
  <circle cx="320" cy="70" r="3" fill="#ff4d6d" class="splatter" />
  <circle cx="360" cy="85" r="2" fill="#06d6a0" class="splatter" />
  <circle cx="430" cy="110" r="5" fill="#ff9f1c" class="splatter" />
  <circle cx="455" cy="140" r="3" fill="#4ea8de" class="splatter" />
  <circle cx="465" cy="175" r="4" fill="#e63946" class="splatter" />
  <circle cx="440" cy="260" r="3.5" fill="#7209b7" class="splatter" />
  <circle cx="400" cy="280" r="4.5" fill="#06d6a0" class="splatter" />
  <circle cx="310" cy="290" r="3" fill="#ff9f1c" class="splatter" />
  <circle cx="250" cy="285" r="5" fill="#ff4d6d" class="splatter" />
  <circle cx="190" cy="292" r="3" fill="#4ea8de" class="splatter" />
  <circle cx="130" cy="270" r="4" fill="#e63946" class="splatter" />
  <circle cx="100" cy="220" r="2.5" fill="#7209b7" class="splatter" />
  <circle cx="95" cy="180" r="3" fill="#06d6a0" class="splatter" />
  <circle cx="990" cy="120" r="3" fill="#7209b7" class="splatter" />
  <circle cx="1020" cy="160" r="2.5" fill="#06d6a0" class="splatter" />
  <circle cx="600" cy="190" r="3.5" fill="#ff9f1c" class="splatter" />
  <circle cx="960" cy="220" r="2" fill="#ff4d6d" class="splatter" />
  <circle cx="610" cy="100" r="4" fill="#4ea8de" class="splatter" />

  <!-- Brand Typography (Right) -->
  <text x="620" y="175" class="brand-title">skills</text>
  <text x="625" y="218" class="brand-tagline">Portable AI skill library</text>
</svg>